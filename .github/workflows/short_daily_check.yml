name: v12 Short Signal Check

on:
  schedule:
    # KST 07:30 = UTC 22:30 (전일) — 미 시장 마감 후
    - cron: '30 22 * * 1-5'
    # KST 22:30 = UTC 13:30 (당일) — 미 시장 개장 전
    - cron: '30 13 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy requests
      
      - name: Run short signal check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python auto_signal_short.py
      
      - name: Verify outputs
        run: |
          for f in data_short.json data_unified.json; do
            if [ ! -f "$f" ]; then
              echo "❌ $f 생성 안 됨!"
              exit 1
            fi
            echo "✓ $f 존재"
          done
          python -c "import json; d=json.load(open('data_unified.json')); print(f\"unified timestamp: {d.get('timestamp','N/A')}\"); st=d.get('short_term',{}); print(f\"short_term.level: {st.get('level','N/A')}\"); lt=d.get('long_term',{}); print(f\"long_term.fg: {lt.get('fg','N/A')}\")"
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 명시적으로 모든 데이터 파일 staging
          git add data_short.json data_unified.json previous_signal_short.json 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "변경 사항 없음 — commit 생략"
          else
            git commit -m "📊 v12 short signal update $(date -u +%Y-%m-%dT%H:%MZ)"
            echo "Push 시도..."
            git push origin main
            echo "✓ Push 완료"
          fi
