name: v12 Short Signal Check

on:
  schedule:
    # KST 07:30 = UTC 22:30 (전일) — 미 시장 마감 후
    - cron: '30 22 * * 1-5'
    # KST 22:30 = UTC 13:30 (당일) — 미 시장 개장 전
    - cron: '30 13 * * 1-5'
  workflow_dispatch:  # 수동 실행 허용

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy requests
      
      - name: Run short signal check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python auto_signal_short.py
      
      - name: Commit JSON outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add previous_signal_short.json data_short.json data_unified.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 v12 short signal update $(date -u +%Y-%m-%d_%H:%M)"
            git push
          fi
